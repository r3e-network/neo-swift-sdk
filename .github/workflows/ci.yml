name: Build and Test

'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SWIFT_VERSION: "6.1.2"

jobs:
  ubuntu:
    name: Ubuntu Swift 6.1.2
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test -Xswiftc -warnings-as-errors --parallel

  macos:
    name: macOS Swift 6.1.2
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test -Xswiftc -warnings-as-errors --parallel
