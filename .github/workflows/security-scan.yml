name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

env:
  SWIFT_VERSION: "6.1.2"

jobs:
  security:
    name: Security and Warning Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Build with warnings as errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run tests with warnings as errors
        run: swift test -Xswiftc -warnings-as-errors

      - name: Secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            dir /repo --redact --exit-code=1

      - name: Dependency vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=Package.resolved

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit p/swift p/secrets
