name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

env:
  SWIFT_VERSION: "6.1.2"

jobs:
  security:
    name: Security and Warning Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Build with warnings as errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run security tests
        run: swift test --filter SecurityTests

      - name: Check for obvious committed secrets
        run: |
          if git grep -n -I -E '(private[_-]?key|password|secret|token)[[:space:]]*=[[:space:]]*"' -- Sources; then
            echo "Potential committed secret found."
            exit 1
          fi

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit p/swift p/secrets
